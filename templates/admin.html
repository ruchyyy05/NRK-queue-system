<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | NRK Hospital</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
}

.topbar{
background:#0f172a;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.topbar h1{
margin:0;
font-size:24px;
}

.right{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
text-decoration:none;
color:white;
font-size:14px;
}

.logout{background:#ef4444;}
.report{background:#2563eb;}

.container{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
color:#0f172a;
font-size:18px;
}

.card p{
font-size:30px;
font-weight:bold;
color:#2563eb;
margin-top:12px;
}

.actions{
display:flex;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-size:15px;
}

.next-btn{background:#16a34a;}
.reset-btn{background:#dc2626;}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

th,td{
padding:14px;
border-bottom:1px solid #e2e8f0;
text-align:left;
}

th{
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<div class="topbar">
<h1>NRK Hospital Admin Panel</h1>

<div class="right">
<a href="/admin/report" class="btn report">Download Report</a>
<a href="/admin/logout" class="btn logout">Logout</a>
</div>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Bookings</h2>
<p id="total">0</p>
</div>

<div class="card">
<h2>Full Slots</h2>
<p id="full">0</p>
</div>

</div>

<div class="actions">
<button class="next-btn" onclick="callNext()">Call Next Token</button>
<button class="reset-btn" onclick="resetQueue()">Reset Queue</button>
</div>

<table>
<thead>
<tr>
<th>Token</th>
<th>Slot Time</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>
</table>

</div>

<script>
async function loadStats(){

let res = await fetch('/api/admin/stats');
let data = await res.json();

document.getElementById("total").innerText = data.total;
document.getElementById("full").innerText = data.full;
}

async function loadBookings(){

let res = await fetch('/api/admin/bookings');
let data = await res.json();

let html = "";

data.forEach(row => {
html += `
<tr>
<td>${row[0]}</td>
<td>${row[1]}</td>
</tr>
`;
});

document.getElementById("bookingTable").innerHTML = html;
}

async function callNext(){

await fetch('/api/admin/next',{
method:'POST'
});

loadStats();
loadBookings();
}

async function resetQueue(){

if(confirm("Reset complete queue?")){

await fetch('/api/admin/reset',{
method:'POST'
});

loadStats();
loadBookings();
}
}

loadStats();
loadBookings();

setInterval(() => {
loadStats();
loadBookings();
}, 2000);
</script>

</body>
</html>
